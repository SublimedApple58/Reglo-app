<!DOCTYPE html>

<html lang="it"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Reglo — Sposta guida (mobile BottomSheet preview)</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          slate: { 50: "#F8FAFC", 200: "#E2E8F0", 300: "#CBD5E1", 400: "#94A3B8", 500: "#64748B", 600: "#475569", 800: "#1E293B", 900: "#0F172A" },
          pink: { 50: "#FDF2F8", 100: "#FCE7F3", 200: "#FBCFE8", 400: "#F472B6", 500: "#EC4899", 600: "#DB2777", 700: "#BE185D" },
          yellow: { 50: "#FEFCE8", 600: "#CA8A04" }
        },
        fontFamily: { body: ["Inter", "sans-serif"] },
        borderRadius: { DEFAULT: "0.25rem", lg: "0.5rem", xl: "0.75rem", "2xl": "1.25rem", full: "9999px" }
      },
    },
  }
</script>
<style>
  body { font-family: 'Inter', sans-serif; }
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
</style>
</head>
<body class="bg-slate-100 flex justify-center items-center min-h-screen">

<div class="relative w-[390px] h-[844px] bg-white overflow-hidden shadow-2xl rounded-[3rem] border-[8px] border-slate-900">
  <!-- Dimmed background -->
  <div class="absolute inset-0 z-0">
    <header class="flex justify-between items-center w-full px-4 h-14 border-b border-slate-200 bg-white">
      <span class="material-symbols-outlined text-slate-900">arrow_back</span>
      <span class="font-semibold text-[18px] text-slate-900">Dettaglio Guida</span>
      <span class="material-symbols-outlined text-slate-900">more_vert</span>
    </header>
    <div class="p-6 space-y-6">
      <div class="space-y-2">
        <div class="h-4 w-24 bg-slate-200 rounded"></div>
        <div class="h-8 w-48 bg-slate-300 rounded"></div>
      </div>
      <div class="flex items-center space-x-4">
        <div class="h-12 w-12 rounded-full bg-pink-100"></div>
        <div class="space-y-2">
          <div class="h-4 w-32 bg-slate-200 rounded"></div>
          <div class="h-3 w-20 bg-slate-100 rounded"></div>
        </div>
      </div>
      <div class="aspect-video w-full rounded-2xl bg-slate-100"></div>
    </div>
    <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-[2px] z-10"></div>
  </div>

  <!-- Bottom Sheet -->
  <div class="absolute bottom-0 left-0 right-0 z-20 flex flex-col items-center">
    <div class="w-full flex flex-col items-center pt-3 pb-5 bg-white rounded-t-[20px] border-t border-slate-200">
      <!-- Handle grabber, no X button (per Reglo convention) -->
      <div class="w-10 h-1 bg-slate-300 rounded-full"></div>
    </div>

    <div class="w-full bg-white px-6">
      <div class="mb-6">
        <h2 class="text-[18px] font-semibold leading-[24px] text-slate-900 tracking-[-0.01em]">Sposta guida di Anna Bianchi</h2>
        <p class="text-[13px] text-slate-500 font-normal mt-0.5">Guida 1h · oggi mar 22 apr alle 14:00</p>
      </div>

      <div class="space-y-3 mb-6">
        <!-- Cambia data -->
        <div class="flex items-center justify-between p-3 border border-slate-200 rounded-xl">
          <div class="flex items-center space-x-3">
            <div class="w-10 h-10 rounded-lg bg-pink-50 flex items-center justify-center">
              <span class="material-symbols-outlined text-pink-500">calendar_today</span>
            </div>
            <div class="flex flex-col">
              <span class="text-sm font-medium text-slate-900">Cambia data</span>
              <span class="text-xs font-semibold text-pink-600">mer 23 apr</span>
            </div>
          </div>
          <span class="material-symbols-outlined text-slate-400">chevron_right</span>
        </div>

        <!-- Cambia orario -->
        <div class="flex items-center justify-between p-3 border border-slate-200 rounded-xl">
          <div class="flex items-center space-x-3">
            <div class="w-10 h-10 rounded-lg bg-yellow-50 flex items-center justify-center">
              <span class="material-symbols-outlined text-yellow-600">schedule</span>
            </div>
            <div class="flex flex-col">
              <span class="text-sm font-medium text-slate-900">Cambia orario</span>
              <span class="text-xs font-semibold text-pink-600">10:30</span>
            </div>
          </div>
          <span class="material-symbols-outlined text-slate-400">chevron_right</span>
        </div>
      </div>

      <!-- Preview -->
      <div class="bg-pink-50 border border-pink-200 rounded-xl p-4 mb-8">
        <div class="flex items-center space-x-2 mb-2">
          <span class="px-1.5 py-0.5 bg-pink-500 text-white text-[10px] font-bold tracking-wider rounded-sm">NUOVA</span>
          <span class="text-sm font-semibold text-slate-900">mer 23 apr · 10:30</span>
        </div>
        <div class="inline-flex items-center px-2.5 py-1 bg-pink-100 rounded-full">
          <span class="text-xs font-semibold text-pink-700 tracking-tight">+1g · −3h 30m</span>
        </div>
      </div>

      <!-- Footer -->
      <div class="flex flex-col space-y-2 pb-8">
        <button class="w-full h-14 bg-pink-500 text-white font-semibold rounded-xl">Conferma spostamento</button>
        <button class="w-full h-12 text-slate-600 font-medium rounded-lg">Annulla</button>
      </div>
    </div>
  </div>

  <div class="absolute bottom-2 left-1/2 -translate-x-1/2 w-32 h-1.5 bg-slate-900 rounded-full z-30"></div>
</div>
</body></html>
